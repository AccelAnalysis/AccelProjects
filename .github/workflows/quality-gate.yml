name: AccelProjects Quality Gate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality-gate:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.17.0"
          cache: npm

      - name: Set up Java for Firebase Emulator
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Unit and component tests
        run: npm test

      - name: Firestore security rules tests
        run: npm run test:rules

      - name: Storage security rules tests
        run: npm run test:storage-rules

      - name: Lifecycle emulator acceptance tests
        run: npm run test:lifecycle-acceptance

      - name: Production build
        run: npm run build

      - name: Committed-file guard
        run: npm run check:committed-files

      - name: Diff whitespace check
        run: git diff --check origin/${{ github.base_ref || 'main' }}...HEAD
